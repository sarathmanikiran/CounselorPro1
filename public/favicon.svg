<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Emerald Green Gradient from #10b981 to #047857 -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Rounded Square Badge with rx corners at 22% of width (22px) -->
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#emerald-grad)" />

  <!-- Compass Star Group Centered around (50, 45) -->
  <g id="compass-star">
    <!-- North Point (Kite Shape) - Fully Opaque (1.0) -->
    <polygon points="50,45 45,40 50,18 55,40" fill="#ffffff" opacity="1.0" />
    
    <!-- West Point (Kite Shape) - Fully Opaque (1.0) -->
    <polygon points="50,45 40,40 18,45 40,50" fill="#ffffff" opacity="0.95" />

    <!-- South Point (Kite Shape) - Slightly Shaded (0.7) -->
    <polygon points="50,45 45,50 50,64 55,50" fill="#ffffff" opacity="0.7" />

    <!-- East Point (Kite Shape) - Slightly Shaded (0.65) -->
    <polygon points="50,45 60,40 78,45 60,50" fill="#ffffff" opacity="0.65" />
    
    <!-- Center White Ring and Small Emerald Dot -->
    <circle cx="50" cy="45" r="4.5" fill="#ffffff" />
    <circle cx="50" cy="45" r="2" fill="#047857" />
  </g>

  <!-- Upward Path/Swoosh (Guidance) near the bottom -->
  <path d="M 18,74 C 36,63 64,63 82,71" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9" />
  
  <!-- Small white dot at the end of the destination arc -->
  <circle cx="82" cy="71" r="2.5" fill="#ffffff" />
</svg>
